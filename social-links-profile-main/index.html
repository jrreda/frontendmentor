<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Social links profile challenge solution by REDA"
    />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script defer src="https://cdn.tailwindcss.com"></script>

    <!-- Configure Tailwind to use the custom font -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>

  <body
    class="flex flex-col justify-center items-center bg-zinc-900 h-screen font-inter text-white"
  >
    <main
      class="flex flex-col justify-center items-center gap-4 bg-zinc-800/50 shadow-md hover:shadow-xl p-10 rounded-xl max-w-[375px] transition-shadow duration-300 container"
    >
      <figure class="flex flex-col justify-center items-center gap-4">
        <img
          src="./assets/images/avatar-jessica.jpeg"
          width="96"
          height="96"
          alt="Profile picture of Jessica Randall"
          class="rounded-full w-24 h-24 object-cover"
        />
        <figcaption class="flex flex-col justify-center items-center gap-1">
          <h1 class="text-3xl">Jessica Randall</h1>
          <p class="font-bold text-lime-300 text-md">London, United Kingdom</p>
          <p class="mt-6 text-gray-200 text-sm">"Front-end developer and avid reader."</p>
        </figcaption>
      </figure>
      <div class="flex flex-col justify-center items-center gap-4 mt-2 w-full">
        <a
          href="https://github.com"
          target="_blank"
          aria-label="GitHub"
          rel="noopener noreferrer"
          tabindex="0"
          class="bg-zinc-700 hover:bg-lime-400 p-3 rounded-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lime-400 focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-900 w-full font-semibold text-white hover:text-zinc-900 text-sm text-center transition-all duration-300"
          >GitHub</a
        >
        <a
          href="https://frontendmentor.io/profile"
          target="_blank"
          aria-label="Frontend Mentor"
          rel="noopener noreferrer"
          tabindex="0"
          class="bg-zinc-700 hover:bg-lime-400 p-3 rounded-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lime-400 focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-900 w-full font-semibold text-white hover:text-zinc-900 text-sm text-center transition-all duration-300"
          >Frontend Mentor</a
        >
        <a
          href="https://linkedin.com/in"
          aria-label="LinkedIn"
          rel="noopener noreferrer"
          tabindex="0"
          target="_blank"
          class="bg-zinc-700 hover:bg-lime-400 p-3 rounded-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lime-400 focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-900 w-full font-semibold text-white hover:text-zinc-900 text-sm text-center transition-all duration-300"
          >LinkedIn</a
        >
        <a
          href="https://twitter.com"
          aria-label="Twitter"
          rel="noopener noreferrer"
          tabindex="0"
          target="_blank"
          class="bg-zinc-700 hover:bg-lime-400 p-3 rounded-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lime-400 focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-900 w-full font-semibold text-white hover:text-zinc-900 text-sm text-center transition-all duration-300"
          >Twitter</a
        >
        <a
          href="https://instagram.com"
          aria-label="Instagram"
          rel="noopener noreferrer"
          tabindex="0"
          target="_blank"
          class="bg-zinc-700 hover:bg-lime-400 p-3 rounded-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lime-400 focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-900 w-full font-semibold text-white hover:text-zinc-900 text-sm text-center transition-all duration-300"
          >Instagram</a
        >
      </div>
    </main>

    <footer class="mt-4 text-zinc-500 text-sm text-center">
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        rel="noopener noreferrer"
        tabindex="0"
        class="focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lime-400 focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-900 hover:text-lime-400"
        >Frontend Mentor</a
      >. Coded by
      <a
        href="https://www.frontendmentor.io/profile/jrreda"
        target="_blank"
        rel="noopener noreferrer"
        tabindex="0"
        class="focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lime-400 focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-900 text-blue-500 hover:text-lime-400"
        >REDA</a
      >.
    </footer>
  </body>
</html>
