<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Blog preview card challenge solution by REDA"
    />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script defer src="https://cdn.tailwindcss.com"></script>

    <!-- Configure Tailwind to use the custom font -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              figtree: ["Figtree", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>

  <body class="bg-yellow-400 font-figtree">
    <main
      class="flex flex-col justify-center items-center gap-4 mx-auto max-w-[1440px] h-screen container"
    >
      <article
        class="flex flex-col flex-wrap justify-center items-center gap-4 bg-white shadow-[8px_8px_0px_0px_#000000] hover:shadow-[10px_10px_0px_0px_#000000] p-4 border border-black rounded-2xl max-w-[375px] text-center transition-shadow duration-300"
      >
        <figure>
          <img
            src="./assets/images/illustration-article.svg"
            alt="Drawers"
            width="336"
            height="200"
            class="rounded-2xl w-full h-full object-cover"
          />
        </figure>

        <div class="flex flex-col justify-start items-start gap-4 mt-2">
          <span
            class="bg-yellow-400 hover:bg-yellow-300 px-3 py-1 rounded-md font-bold text-black text-sm leading-snug tracking-tight transition-all duration-300"
            >Learning</span
          >
          <time
            datetime="2023-12-21"
            class="text-gray-700 text-sm leading-snug tracking-tight"
            >Published 21 Dec 2023</time
          >
          <h1 class="font-bold text-2xl leading-tight tracking-tight">
            HTML & CSS foundations
          </h1>
          <p class="text-gray-500 text-md text-left leading-snug">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
          <div class="group flex justify-start items-center gap-2">
            <img
              src="./assets/images/image-avatar.webp"
              alt="Avatar"
              width="40"
              height="40"
              class="rounded-full w-10 h-10 group-hover:scale-110 transition-all duration-300"
            />
            <span
              class="font-bold text-gray-800 group-hover:text-yellow-500 text-sm group-hover:underline transition-all duration-300"
              >Greg Hooper</span
            >
          </div>
        </div>
      </article>

      <footer class="mt-4 text-gray-500 text-sm text-center">
        Challenge by
        <a
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          class="focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-yellow-500 focus-visible:ring-offset-2"
          >Frontend Mentor</a
        >. Coded by
        <a
          href="https://www.frontendmentor.io/profile/jrreda"
          target="_blank"
          class="focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-yellow-500 focus-visible:ring-offset-2 text-blue-500"
          >REDA</a
        >.
      </footer>
    </main>
  </body>
</html>
